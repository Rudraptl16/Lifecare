<div class="page-view" id="appointmentsPage">

  <!-- ===== SECTION TITLE ===== -->
  <div class="section-title" style="margin-top:0">
    <h2><i class="fas fa-calendar-check"></i> Patient Appointments</h2>
    <button id="apptAddNewBtn" class="button-primary"
      style="padding:8px 14px;border-radius:12px;font-weight:700;display:inline-flex;align-items:center;gap:8px;">
      <i class="fas fa-calendar-plus"></i> New Appointment
    </button>
  </div>

  <!-- ===== STATS SUMMARY ===== -->
  <div class="patients-stats" style="margin-bottom:20px;">
    <div class="p-stat-card green">
      <div class="p-stat-icon"><i class="fas fa-calendar-check"></i></div>
      <div class="p-stat-content">
        <span>Active Bookings</span>
        <h4 id="apptStatActive">0</h4>
      </div>
    </div>
    <div class="p-stat-card blue">
      <div class="p-stat-icon"><i class="fas fa-stethoscope"></i></div>
      <div class="p-stat-content">
        <span>Today's Visits</span>
        <h4 id="apptStatToday">0</h4>
      </div>
    </div>
    <div class="p-stat-card amber">
      <div class="p-stat-icon"><i class="fas fa-heartbeat"></i></div>
      <div class="p-stat-content">
        <span>Cardiology</span>
        <h4 id="apptStatCardio">0</h4>
      </div>
    </div>
  </div>

  <!-- ===== FILTERS ===== -->
  <div class="doctor-controls" style="margin-bottom:20px;">
    <input id="apptSearchInput" type="text" placeholder="Search patient or doctor..."
      style="flex:1;min-width:220px;padding:10px 14px;border-radius:12px;border:1px solid var(--gray-200);outline:none;" />
    <select id="apptDeptFilter"
      style="padding:10px 14px;border-radius:12px;border:1px solid var(--gray-200);outline:none;font-weight:600;color:var(--gray-700);">
      <option value="all">All Departments</option>
      <option value="Cardiology">Cardiology</option>
      <option value="Emergency">Emergency</option>
      <option value="Pediatrics">Pediatrics</option>
      <option value="Radiology">Radiology</option>
      <option value="Neurology">Neurology</option>
      <option value="Orthopedics">Orthopedics</option>
    </select>
  </div>

  <!-- ===== APPOINTMENT CARDS ===== -->
  <div class="appointment-grid" id="appointmentContainer">
    <!-- Dynamically populated from JS -->
  </div>

</div>
