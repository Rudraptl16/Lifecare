<!-- ===== INVOICE MODAL ===== -->
<div id="invoiceModal" class="patient-modal" aria-hidden="true">
  <div class="patient-modal__backdrop" data-invoice-modal-close></div>
  <div class="patient-modal__panel" role="dialog" aria-modal="true" aria-labelledby="invoiceModalTitle"
    style="max-width:600px;width:90%;border-radius:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.4);">

    <div class="patient-modal__header"
      style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--gray-200);">
      <h3 id="invoiceModalTitle"
        style="font-size:1.25rem;font-weight:800;color:var(--gray-900);display:inline-flex;align-items:center;gap:8px;margin:0;">
        <i class="fas fa-file-invoice" style="color:var(--primary);"></i> Invoice Statement
      </h3>
      <button data-invoice-modal-close type="button"
        style="border:none;background:transparent;cursor:pointer;color:var(--gray-500);font-size:1.5rem;line-height:1;padding:0;">&times;</button>
    </div>

    <div class="patient-modal__body" id="invoiceModalBody"
      style="padding:20px;overflow-y:auto;max-height:60vh;">
      <!-- Dynamically populated from JS -->
    </div>

    <div class="patient-modal__footer"
      style="padding:16px 20px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;align-items:center;gap:12px;">
      <button id="invoiceDownloadPdfBtn" type="button" class="button-primary"
        style="background:#2563eb;color:#fff;border:none;padding:10px 18px;border-radius:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;">
        <i class="fas fa-file-pdf"></i> Download PDF
      </button>
      <button data-invoice-modal-close type="button" class="button-outline"
        style="border:1px solid var(--gray-300);background:#fff;color:var(--gray-700);padding:10px 18px;border-radius:12px;font-weight:700;cursor:pointer;">
        Close
      </button>
    </div>

  </div>
</div>


<!-- ===== APPOINTMENT MODAL ===== -->
<div id="appointmentModal" class="patient-modal" aria-hidden="true">
  <div class="patient-modal__backdrop" id="apptModalBackdrop"></div>
  <div class="patient-modal__panel" role="dialog" aria-modal="true" style="max-width:480px;">

    <div class="patient-modal__header"
      style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--gray-200);">
      <h3 id="apptModalTitle" style="font-size:1.1rem;color:var(--gray-900)">New Appointment</h3>
      <button id="apptModalCloseBtn" type="button"
        style="border:none;background:transparent;cursor:pointer;color:var(--gray-500);font-size:1.2rem;">&times;</button>
    </div>

    <div class="patient-modal__body" style="padding:16px;display:flex;flex-direction:column;gap:12px;">
      <input id="apptIdInput" type="hidden" value="" />
      <label style="font-weight:700;color:var(--gray-700);font-size:0.9rem;">
        Patient Name
        <input id="apptPatientInput" type="text" placeholder="Hanna Schultz"
          style="width:100%;margin-top:6px;padding:10px 14px;border-radius:12px;border:1px solid var(--gray-200);outline:none;" />
      </label>
      <label style="font-weight:700;color:var(--gray-700);font-size:0.9rem;">
        Assigned Doctor
        <select id="apptDoctorSelect"
          style="width:100%;margin-top:6px;padding:10px 14px;border-radius:12px;border:1px solid var(--gray-200);outline:none;font-weight:700;color:var(--gray-700);"></select>
      </label>
      <div style="display:flex;gap:12px;">
        <label style="flex:1;font-weight:700;color:var(--gray-700);font-size:0.9rem;">
          Date
          <input id="apptDateInput" type="date"
            style="width:100%;margin-top:6px;padding:10px 14px;border-radius:12px;border:1px solid var(--gray-200);outline:none;" />
        </label>
        <label style="flex:1;font-weight:700;color:var(--gray-700);font-size:0.9rem;">
          Time
          <input id="apptTimeInput" type="time"
            style="width:100%;margin-top:6px;padding:10px 14px;border-radius:12px;border:1px solid var(--gray-200);outline:none;" />
        </label>
      </div>
      <label style="font-weight:700;color:var(--gray-700);font-size:0.9rem;">
        Department
        <select id="apptDeptSelect"
          style="width:100%;margin-top:6px;padding:10px 14px;border-radius:12px;border:1px solid var(--gray-200);outline:none;font-weight:700;color:var(--gray-700);">
          <option value="Cardiology">Cardiology</option>
          <option value="Emergency">Emergency</option>
          <option value="Pediatrics">Pediatrics</option>
          <option value="Radiology">Radiology</option>
          <option value="Neurology">Neurology</option>
          <option value="Orthopedics">Orthopedics</option>
        </select>
      </label>
    </div>

    <div class="patient-modal__footer"
      style="padding:14px 16px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:10px;">
      <button id="apptCancelBtn" type="button" class="button-outline">Cancel</button>
      <button id="apptSaveBtn" type="button" class="button-primary">Save Appointment</button>
    </div>

  </div>
</div>


<!-- ===== DEPARTMENT SHIFT EDITOR MODAL ===== -->
<div id="deptShiftModal" class="patient-modal" aria-hidden="true">
  <div class="patient-modal__backdrop" id="deptShiftBackdrop"></div>
  <div class="patient-modal__panel" role="dialog" aria-modal="true" style="max-width:400px;">

    <div class="patient-modal__header"
      style="display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--gray-200);">
      <h3 id="deptShiftTitle" style="font-size:1.1rem;color:var(--gray-900)">Edit Shift Assignment</h3>
      <button id="deptShiftCloseBtn" type="button"
        style="border:none;background:transparent;cursor:pointer;color:var(--gray-500);font-size:1.2rem;">&times;</button>
    </div>

    <div class="patient-modal__body" style="padding:16px;display:flex;flex-direction:column;gap:12px;">
      <p style="margin:0;font-size:0.9rem;color:var(--gray-600);">
        Select a doctor to assign to the <strong id="deptShiftLabel">Morning</strong> shift for
        <strong id="deptShiftName">Cardiology</strong>.
      </p>
      <label style="font-weight:700;color:var(--gray-700);font-size:0.9rem;">
        Select Doctor
        <select id="deptShiftDoctorSelect"
          style="width:100%;margin-top:6px;padding:10px 14px;border-radius:12px;border:1px solid var(--gray-200);outline:none;font-weight:700;color:var(--gray-700);"></select>
      </label>
    </div>

    <div class="patient-modal__footer"
      style="padding:14px 16px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:10px;">
      <button id="deptShiftCancelBtn" type="button" class="button-outline">Cancel</button>
      <button id="deptShiftSaveBtn" type="button" class="button-primary">Save Assignment</button>
    </div>

  </div>
</div>
